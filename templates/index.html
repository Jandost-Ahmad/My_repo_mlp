<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>MLP Classifier</title>
  <style>
    /* ── reset & tokens ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d14;
      --surface:   #16161f;
      --card:      #1e1e2e;
      --border:    #2e2e45;
      --accent:    #7c6af7;
      --accent2:   #5be3c1;
      --text:      #e4e4f0;
      --muted:     #8888aa;
      --danger:    #f56565;
      --radius:    14px;
      --canvas-px: clamp(240px, 82vw, 420px);
      --content-max: 900px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 40px;
      gap: 20px;
    }

    /* ── header ──────────────────────────────────────────────────── */
    header {
      text-align: center;
      width: 100%;
      max-width: var(--content-max);
    }
    header h1 {
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }
    header p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 4px;
    }

    /* ── main card ───────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      width: 100%;
      max-width: var(--content-max);
    }

    /* ── model selector ──────────────────────────────────────────── */
    .model-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }
    .model-btn {
      flex: 1 1 auto;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all .2s;
      text-align: center;
      white-space: nowrap;
    }
    .model-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(124,106,247,.1);
    }

    /* ── two-column layout ───────────────────────────────────────── */
    .cols {
      display: grid;
      grid-template-columns: minmax(0, var(--canvas-px)) minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 900px) {
      .cols { grid-template-columns: 1fr; gap: 16px; }
    }

    /* ── canvas wrapper ──────────────────────────────────────────── */
    .canvas-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .canvas-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    #drawCanvas {
      width: 100%;
      max-width: var(--canvas-px);
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: #ffffff;
      touch-action: none;
      cursor: crosshair;
      display: block;
    }
    .canvas-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      flex: 1;
      min-width: 0;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #5b52c4);
      color: #fff;
    }
    .btn-primary:hover  { opacity: .88; }
    .btn-primary:active { transform: scale(.97); }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; }
    .btn-ghost {
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    /* ── result panel ────────────────────────────────────────────── */
    .result-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .prediction-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      text-align: center;
    }
    .prediction-box .pred-char {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      min-height: 4.5rem;
    }
    .prediction-box .pred-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 6px;
    }

    /* spinner */
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 6px auto 0;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* status */
    .status {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      min-height: 1.2em;
    }
    .status.error { color: var(--danger); }

    /* ── activation viewer ───────────────────────────────────────── */
    .section-title {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 10px;
      margin-top: 24px;
    }

    .layer-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .tab {
      padding: 5px 11px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all .18s;
    }
    .tab.active {
      border-color: var(--accent2);
      color: var(--accent2);
      background: rgba(91,227,193,.1);
    }

    .activation-img-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 120px;
    }
    #activationImg {
      max-width: 100%;
      border-radius: 6px;
      image-rendering: pixelated;
      display: none;
    }
    .no-output {
      color: var(--muted);
      font-size: 0.8rem;
    }

    /* ── 3D viz teaser ───────────────────────────────────────────── */
    .viz-teaser {
      margin-top: 24px;
      padding: 16px;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
    }
    .viz-teaser span { color: var(--accent); font-weight: 600; }

    /* ── responsive tweaks ───────────────────────────────────────── */
    @media (max-width: 900px) {
      body { padding: 16px 12px 28px; }
      .card { padding: 16px; }
    }

    @media (max-width: 620px) {
      .canvas-actions { flex-direction: column; }
      .btn { width: 100%; }
      .prediction-box .pred-char { font-size: 3.2rem; }
      .prediction-box { padding: 14px; }
      .result-panel { gap: 10px; }
    }
  </style>
</head>

<body>

  <header>
    <h1>MLP Classifier</h1>
    <p>Draw a digit — the neural network will predict it.</p>
  </header>

  <!-- ── main card ───────────────────────────────────────────────── -->
  <div class="card">

    <!-- two columns -->
    <div class="cols">

      <!-- left: drawing area -->
      <div class="canvas-wrap">
        <span class="canvas-label">Draw here</span>
        <canvas id="drawCanvas"></canvas>
        <div class="canvas-actions">
          <button class="btn btn-primary" id="predictBtn">Predict</button>
          <button class="btn btn-ghost"   id="clearBtn">Clear</button>
        </div>
      </div>

      <!-- right: result -->
      <div class="result-panel">
        <div class="prediction-box">
          <div class="pred-char" id="predChar">?</div>
          <div class="spinner"   id="spinner"></div>
          <div class="pred-label">Prediction</div>
        </div>
        <div class="status" id="statusMsg">Draw something and press Predict.</div>
      </div>
    </div>

    <!-- activation viewer -->
    <div class="section-title">Layer activations</div>
    <div class="layer-tabs" id="layerTabs">
      <span class="no-output" id="noOutputHint">Run a prediction first.</span>
    </div>
    <div class="activation-img-wrap">
      <img id="activationImg" alt="activation map" />
      <span class="no-output" id="noActImg">No activations yet.</span>
    </div>

    <!-- 3D teaser -->
    <div class="viz-teaser" style="cursor:pointer" onclick="openViz()">
      🧊 <span>3D MLP Visualisation</span> — Click to open<br>
    </div>

  </div>

  <script>
  /* ══════════════════════════════════════════════════════════════════
     CONFIG
  ══════════════════════════════════════════════════════════════════ */
  function openViz(){
    const pred = document.getElementById('predChar').textContent;
    const url  = `/viz${pred && pred!=='?' ? '?pred='+encodeURIComponent(pred) : ''}`;
    window.open(url, '_blank');
  }

  const API_BASE    = "http://192.168.0.84:5000";
  const FIREBASE_URL = "https://console.firebase.google.com/u/0/project/mlp-mm/database/mlp-mm-default-rtdb/data/~2F";
  const canvasEl = document.getElementById("drawCanvas");
  const ctx      = canvasEl.getContext("2d");

  function resizeCanvas() {
    const cssSize = canvasEl.getBoundingClientRect().width || 340;
    const dpr     = window.devicePixelRatio || 1;
    canvasEl.width  = cssSize * dpr;
    canvasEl.height = cssSize * dpr;
    ctx.setTransform(1,0,0,1,0,0); // avoid compounding scale on resize
    ctx.scale(dpr, dpr);
    clearCanvas();
  }

  function clearCanvas() {
    ctx.save();
    ctx.setTransform(1,0,0,1,0,0);
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvasEl.width, canvasEl.height);
    ctx.restore();
  }

  window.addEventListener("resize", resizeCanvas);
  resizeCanvas();

  /* ── drawing state ─────────────────────────────────────────────── */
  let drawing    = false;
  let lastX = 0, lastY = 0;
  const STROKE_W = 20;  // thick so it matches the MLP's training data scale

  function getPos(e) {
    const rect = canvasEl.getBoundingClientRect();
    if (e.touches) {
      return { x: e.touches[0].clientX - rect.left,
               y: e.touches[0].clientY - rect.top };
    }
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  function startDraw(e) {
    e.preventDefault();
    drawing = true;
    const p = getPos(e);
    lastX = p.x; lastY = p.y;
    ctx.beginPath();
    ctx.arc(p.x, p.y, STROKE_W / 2, 0, Math.PI * 2);
    ctx.fillStyle = "#000";
    ctx.fill();
  }

  function moveDraw(e) {
    if (!drawing) return;
    e.preventDefault();
    const p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(p.x, p.y);
    ctx.strokeStyle = "#000";
    ctx.lineWidth   = STROKE_W;
    ctx.lineCap     = "round";
    ctx.lineJoin    = "round";
    ctx.stroke();
    lastX = p.x; lastY = p.y;
  }

  function endDraw(e) { drawing = false; }

  canvasEl.addEventListener("mousedown",  startDraw);
  canvasEl.addEventListener("mousemove",  moveDraw);
  canvasEl.addEventListener("mouseup",    endDraw);
  canvasEl.addEventListener("mouseleave", endDraw);
  canvasEl.addEventListener("touchstart", startDraw, { passive: false });
  canvasEl.addEventListener("touchmove",  moveDraw,  { passive: false });
  canvasEl.addEventListener("touchend",   endDraw);

  document.getElementById("clearBtn").addEventListener("click", () => {
    clearCanvas();
    document.getElementById("predChar").textContent  = "?";
    document.getElementById("statusMsg").textContent = "Draw something and press Predict.";
    document.getElementById("statusMsg").classList.remove("error");
    document.getElementById("layerTabs").innerHTML   = '<span class="no-output" id="noOutputHint">Run a prediction first.</span>';
    document.getElementById("activationImg").style.display = "none";
    document.getElementById("noActImg").style.display      = "block";
    outputImages = [];
  });

  /* ══════════════════════════════════════════════════════════════════
     PREDICT
  ══════════════════════════════════════════════════════════════════ */
  let outputImages = [];

  const predictBtn   = document.getElementById("predictBtn");
  const predChar     = document.getElementById("predChar");
  const spinner      = document.getElementById("spinner");
  const statusMsg    = document.getElementById("statusMsg");
  const layerTabs    = document.getElementById("layerTabs");
  const activationImg = document.getElementById("activationImg");
  const noActImg      = document.getElementById("noActImg");

  predictBtn.addEventListener("click", async () => {
    const b64 = canvasEl.toDataURL("image/png");

    // UI: loading state
    predictBtn.disabled   = true;
    predChar.textContent  = "";
    spinner.style.display = "block";
    statusMsg.textContent = "Running prediction…";
    statusMsg.classList.remove("error");

    try {
      const res  = await fetch(`${API_BASE}/predict`, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ image: b64 }),
      });

      const data = await res.json();

      if (!res.ok || data.error) {
        throw new Error(data.error || "Unknown server error");
      }

      // show prediction
      predChar.textContent  = data.prediction;
      statusMsg.textContent = `Index: ${data.label_index}`;

      // render layer tabs
      outputImages = data.outputs || [];
      renderTabs(outputImages);

      // store result for the viz page to read
      localStorage.setItem('mlp_last_result', JSON.stringify({
        prediction:  data.prediction,
        label_index: data.label_index,
        probabilities: data.probabilities || [],
        outputs:     data.outputs || [],
        raw_pixels:  data.raw_pixels || [],
        raw_h1:      data.raw_h1 || [],
        raw_h2:      data.raw_h2 || [],
        raw_h3:      data.raw_h3 || [],
        ts:          Date.now(),
      }));

      // ── send to Firebase so laptop viz reacts ─────────────────────────────
      fetch(`${FIREBASE_URL}prediction.json`, {
        method:  "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          prediction:    data.prediction,
          label_index:   data.label_index,
          probabilities: data.probabilities || [],
          raw_pixels:    data.raw_pixels    || [],
          raw_h1:        data.raw_h1        || [],
          raw_h2:        data.raw_h2        || [],
          raw_h3:        data.raw_h3        || [],
          ts:            Date.now(),
        }),
      }).catch(()=>{});
      // ─────────────────────────────────────────────────────────────────────

    } catch (err) {
      predChar.textContent  = "✕";
      statusMsg.textContent = `Error: ${err.message}`;
      statusMsg.classList.add("error");
    } finally {
      spinner.style.display = "none";
      predictBtn.disabled   = false;
    }
  });

  /* ══════════════════════════════════════════════════════════════════
     LAYER TABS
  ══════════════════════════════════════════════════════════════════ */
  function renderTabs(images) {
    layerTabs.innerHTML = "";
    if (!images.length) {
      layerTabs.innerHTML = '<span class="no-output">No activation images found.</span>';
      return;
    }
    images.forEach((img, i) => {
      const btn = document.createElement("button");
      btn.className = "tab" + (i === 0 ? " active" : "");
      btn.textContent = img.label;
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        btn.classList.add("active");
        showActivation(img.url);
      });
      layerTabs.appendChild(btn);
    });
    if (images[0]) showActivation(images[0].url);
  }

  function showActivation(url) {
    activationImg.style.display = "none";
    noActImg.style.display = "block";

    const fullUrl = url.startsWith("http") ? url : `${API_BASE}${url}`;
    activationImg.onload = () => {
      activationImg.style.display = "block";
      noActImg.style.display      = "none";
    };
    activationImg.src = fullUrl + "?t=" + Date.now(); // bust cache
  }
  </script>
</body>
</html>
